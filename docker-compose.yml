services:
  db:
    container_name: money_app_postgres
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: money_app_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    container_name: money_app_backend
    build:
      context: ../__money_app_backend
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_NAME: money_app_development
      RAILS_ENV: development
    env_file:
      - ../__money_app_backend/.env
    depends_on:
      - db
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    ports:
      - "3000:3000"
    volumes:
      - ../__money_app_backend:/rails

  frontend:
    container_name: money_app_frontend
    build:
      context: ../__money_app_frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_HOST: http://backend:3000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ../__money_app_frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
